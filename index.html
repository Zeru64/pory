<!DOCTYPE html>
<html lang="es" class="overflow-y-scroll">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeru's Pory Cards</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { font-family: 'Inter', system_ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .grid-item, .model-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .grid-item:hover, .model-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <nav class="bg-red-600 border-b border-red-700 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between min-w-0">
            <div class="flex items-center gap-x-3">
                <div class="hidden sm:flex w-9 h-9 bg-white rounded-2xl items-center justify-center text-red-600 text-3xl shadow-inner">Pory</div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">Zeru's Porygon</h1>
                    <p class="text-red-200 text-xs -mt-0.5">Universal Set Collection</p>
                </div>
            </div>

            <div class="flex min-w-0 bg-red-700 rounded-3xl p-1 shadow-inner">
                <button onclick="setPage('coleccion')" id="tab-coleccion" class="nav-tab flex-1 px-3 sm:px-8 py-3 rounded-3xl text-sm font-medium truncate">Coleccion</button>
                <button onclick="setPage('faltantes')" id="tab-faltantes" class="nav-tab flex-1 px-3 sm:px-8 py-3 rounded-3xl text-sm font-medium truncate">Faltantes</button>
                <button onclick="setPage('informacion')" id="tab-informacion" class="nav-tab flex-1 px-3 sm:px-8 py-3 rounded-3xl text-sm font-medium truncate">Info</button>
            </div>

            <div class="hidden sm:flex text-xs bg-red-700 text-red-100 px-3 py-1.5 rounded-2xl items-center">
                <span id="total-count" class="font-mono font-semibold">0</span>
            </div>
        </div>
    </nav>

    <div id="main-content" class="max-w-screen-2xl mx-auto px-6 py-8 overflow-x-hidden"></div>

    <!-- Modal Detalle -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
        <div class="bg-white text-zinc-900 rounded-3xl max-w-2xl w-full max-h-[90vh] flex flex-col">
            <div class="p-6 overflow-y-auto" id="detail-content"></div>
        </div>
    </div>

    <!-- Modal Editar / Registrar -->
    <div id="form-modal" class="hidden fixed inset-0 bg-black/80 flex items-start justify-center overflow-y-auto z-[100] p-4">
        <div class="bg-white text-zinc-900 rounded-3xl max-w-xl w-full max-h-[90vh] overflow-y-auto modal">
            <div class="p-8">
                <h2 id="form-title" class="text-2xl font-semibold mb-6">Nuevo Porygon</h2>
                <div class="grid grid-cols-2 gap-x-6 gap-y-5" id="item-form"></div>
                <div class="flex justify-end gap-x-4 mt-10">
                    <button onclick="closeAllModals()" class="px-6 py-3 border border-zinc-300 rounded-2xl hover:bg-zinc-100">Cancelar</button>
                    <button onclick="saveItem()" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 font-semibold">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let database = [];
        let currentPage = 'coleccion';
        let currentModel = null;
        let editingId = null;
		document.addEventListener("keydown", (e) => {
			if (e.key === "Escape") closeAllModals();
		});

        const DB_URL = "https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/database.json";

        const pageConfig = {
            coleccion: { label: 'Coleccion', cat: 'Coleccion' },
            faltantes: { label: 'Faltantes', cat: 'Faltantes' },
            informacion: { label: 'Informacion' }
        };
		
		const allFields = [
            { key: 'id', label: 'ID' },
            { key: 'model', label: 'Card' },
            { key: 'name', label: 'Name' },
            { key: 'year', label: 'Release' },
            { key: 'color', label: 'Language' },
            { key: 'serie1', label: 'Set' },
            { key: 'serie2', label: 'Pack' },
            { key: 'subserie', label: 'Subpack' },
            { key: 'variant', label: 'Variant' },
            { key: 'notes', label: 'Notes' },
            { key: 'collection', label: 'Category', detail: false },
            { key: 'imgurl', label: 'URL Image', detail: false }
        ];

        async function loadDatabase() {
            try {
                const response = await fetch(DB_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('Error');
                database = await response.json();
                database.forEach(item => { if (!item.model) item.model = ''; });
                console.log(`? DB cargada (${database.length} entradas)`);
            } catch (error) {
                console.error("Error cargando DB:", error);
                alert("No se pudo cargar la base de datos desde GitHub.");
            }
            renderContent();
        }
		
		function sortDatabase(data) {
			return [...data].sort((a, b) => {
				const modelCompare =
					(a.model || "").localeCompare(b.model || "");
				if (modelCompare !== 0) return modelCompare;
				return (a.year || 0) - (b.year || 0);
			});
		}

        function renderNav() {
            document.getElementById('total-count').textContent = database.filter(i => i.collection === 'Coleccion').length + " en coleccion / " + database.filter(i => i.collection === 'Faltantes').length + " faltantes";
            ['coleccion','faltantes','informacion'].forEach(tab => {
                const el = document.getElementById(`tab-${tab}`);
                if (el) el.classList.toggle('bg-white', 'text-red-600', tab === currentPage);
            });
        }

        function getModelsInCategory(cat) {
            const items = database.filter(i => i.collection === cat);
            const models = {};
            items.forEach(item => {
                const m = item.model || 'Sin cartas';
                if (!models[m]) models[m] = [];
                models[m].push(item);
            });
            return models;
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            let html = '';

            if (currentPage === 'informacion') {
                const coleccionCount = database.filter(i => i.collection === 'Coleccion').length;
                const faltantesCount = database.filter(i => i.collection === 'Faltantes').length;

                html = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white text-zinc-900 rounded-3xl p-8">
                        <h1 class="text-4xl font-semibold mb-2">Resumen</h1>
                        <p class="text-zinc-500 mb-8">Resumen de tu registro</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-emerald-600 text-sm font-medium">COLECCION</p>
                                <p class="text-5xl sm:text-6xl lg:text-7xl font-semibold text-emerald-600 mt-2">${coleccionCount}</p>
                            </div>
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-amber-600 text-sm font-medium">FALTANTES</p>
                                <p class="text-5xl sm:text-6xl lg:text-7xl font-semibold text-amber-600 mt-2">${faltantesCount}</p>
                            </div>
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-red-600 text-sm font-medium">TOTAL</p>
                                <p class="text-5xl sm:text-6xl lg:text-7xl font-semibold text-red-600 mt-2">${database.length}</p>
                            </div>
                        </div>
                    </div>
                </div>
				<div class="flex justify-center gap-4 text-sm">
					<button onclick="exportData('Coleccion')"
						class="px-6 py-4 bg-zinc-800 text-white rounded-xl
						shadow-md hover:bg-emerald-700 hover:shadow-lg
						transition-all duration-200">
						Exportar Coleccion
					</button>
					<button onclick="exportData('Faltantes')"
						class="px-6 py-4 bg-zinc-800 text-white rounded-xl
						shadow-md hover:bg-emerald-700 hover:shadow-lg
						transition-all duration-200">
						Exportar Faltantes
					</button>
					<button onclick="exportData('All')"
						class="px-6 py-4 bg-zinc-800 text-white rounded-xl
						shadow-md hover:bg-emerald-700 hover:shadow-lg
						transition-all duration-200">
						Exportar Todo
					</button>
				</div>`;
            } else if (currentModel) {
                const items = database.filter(i => i.collection === pageConfig[currentPage].cat && (i.model || 'Sin modelo') === currentModel);
                html = `
                <div class="mb-6 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="backToModels()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">
							<span class="text-lg">\<-</span>
							<span class="hidden sm:inline ml-2">\Volver</span>
						</button>
                        <h1 class="text-3xl font-semibold">${currentModel}</h1>
                    </div>
                    <button onclick="addNewItem()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-3xl text-sm font-medium">
                        <span class="text-2xl">+</span>
						<span class="hidden sm:inline">Nuevo</span>
                    </button>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    ${items.map((item) => `
                        <div onclick="showDetailModalByIndex(${database.indexOf(item)})" class="grid-item bg-white rounded-3xl overflow-hidden cursor-pointer">
                            <img src="${item.imgurl || 'https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'}" class="w-full aspect-video center 20px" onerror="this.src='https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'">
                            <div class="p-3">
                                <p class="font-medium truncate">${item.name}</p>
								<p class="text-s text-zinc-500 truncate">${item.year} ${item.serie1} - ${item.serie2}</p>
								<p class="text-xs text-zinc-500">${item.variant}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            } else {
                const models = getModelsInCategory(pageConfig[currentPage].cat);
                html = `
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-semibold">${pageConfig[currentPage].label}</h1>
                    <button onclick="addNewItem()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-3xl text-sm font-medium">
                        <span class="text-2xl">+</span>
						<span class="hidden sm:inline">Nuevo</span>
                    </button>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4">
                    ${Object.keys(models).sort().map(m => {
                        const first = models[m][0];
                        return `
                        <div onclick="selectModel('${m.replace(/'/g, "\\'")}')" class="model-card bg-white rounded-3xl overflow-hidden cursor-pointer">
                            <img src="${first.imgurl || 'https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'}" class="w-full aspect-video object-cover" onerror="this.src='https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'">
                            <div class="p-5">
                                <p class="font-semibold text-l">${m}</p>
                                <p class="text-zinc-500">${models[m].length} versiones</p>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
            }

            container.innerHTML = html;
            renderNav();
        }

        function selectModel(model) { currentModel = model; renderContent(); }
        function backToModels() { currentModel = null; renderContent(); }
        function setPage(page) { currentPage = page; currentModel = null; renderContent(); }
		function lockScroll() {
			const scrollBarWidth = window.innerWidth - document.documentElement.clientWidth;
			document.body.style.paddingRight = scrollBarWidth + "px";
			document.body.style.overflow = "hidden";
		}
		function unlockScroll() {
			document.body.style.overflow = "";
			document.body.style.paddingRight = "";
		}

        function showDetailModalByIndex(globalIndex) {
			document.body.style.overflow = "hidden";
			lockScroll();
            const item = database[globalIndex];
            if (!item) return;

            let html = `
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-3xl font-semibold">${item.name || 'Sin nombre'}</h2>
                    ${item.year ? `<p class="text-red-600 text-2xl">${item.year}</p>` : ''}
                </div>
                <button onclick="closeAllModals()" class="text-4xl text-zinc-400 hover:text-zinc-600">x</button>
            </div>
            <div class="flex justify-center mb-8">
                <img src="${item.imgurl || 'https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'}" class="max-h-80 rounded-3xl shadow-xl object-contain" onerror="this.src='https://raw.githubusercontent.com/Zeru64/pory/refs/heads/main/whosthatporygon.png'">
            </div>`;

            html += `<div class="grid grid-cols-2 gap-2 text-sm max-w-lg mx-auto">`;
            allFields
				.filter(f => f.detail !== false)
				.forEach(f => {
					html += `
					<div class="flex justify-between items-center bg-zinc-50 px-4 py-3 rounded-xl">
						<span class="text-zinc-500">${f.label}</span>
						<span class="font-medium">${item[f.key] ?? 'xd'}</span>
					</div>`;
            });
            html += `</div>`;

            html += `
            <div class="flex gap-4 mt-10">
                <button onclick="startEditByIndex(${globalIndex})" class="flex-1 py-4 bg-amber-500 text-white rounded-3xl">Editar</button>
                <button onclick="deleteItemByIndex(${globalIndex});closeAllModals()" class="flex-1 py-4 bg-red-500 text-white rounded-3xl">Eliminar</button>
                <button onclick="closeAllModals()" class="flex-1 py-4 bg-zinc-200 text-zinc-700 rounded-3xl">Cerrar</button>
            </div>`;

            document.getElementById('detail-content').innerHTML = html;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function startEditByIndex(index) {
            closeAllModals();
            setTimeout(() => editItemByIndex(index), 300);
        }

        function editItemByIndex(index) {
            editingId = index;
			document.body.style.overflow = "hidden";
            document.getElementById('form-title').textContent = 'Editar Porygon';
            buildForm(index);
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function addNewItem() {
            editingId = null;
            document.getElementById('form-title').textContent = 'Registrar nuevo Porygon';
            buildForm();
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function buildForm(index = null) {
            const item = index !== null ? database[index] : {};
            let html = '';
            allFields.forEach(field => {
                const val = item[field.key] || '';
                if (field.key === 'collection') {
                    html += `<div class="col-span-2"><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <select id="form-${field.key}" class="w-full border border-zinc-200 rounded-3xl px-5 py-4">
                        <option value="Coleccion" ${val==='Coleccion'?'selected':''}>Coleccion</option>
                        <option value="Faltantes" ${val==='Faltantes'?'selected':''}>Faltantes</option>
                    </select></div>`;
                } else if (field.key === 'notes') {
                    html += `<div class="col-span-2"><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <textarea id="form-${field.key}" rows="1" class="w-full border border-zinc-200 rounded-3xl px-5 py-4">${val}</textarea></div>`;
                } else {
                    html += `<div><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <input type="text" id="form-${field.key}" value="${val}" class="w-full border border-zinc-200 rounded-3xl px-5 py-4"></div>`;
                }
            });
            document.getElementById('item-form').innerHTML = html;
        }

        function saveItem() {
            const newItem = {};
            allFields.forEach(f => {
                const el = document.getElementById(`form-${f.key}`);
                if (el) newItem[f.key] = el.value.trim();
            });

            if (!newItem.id || !newItem.name) {
                alert("ID y Nombre son obligatorios");
                return;
            }

            if (editingId !== null) {
                database[editingId] = { ...database[editingId], ...newItem };
            } else {
                database.push(newItem);
            }

            alert("? Registro guardado localmente.\nRecuerda editar el archivo database.json en GitHub para actualizar la versión online.");
            closeAllModals();
            renderContent();
        }

        function deleteItemByIndex(index) {
            if (confirm("¿Eliminar esta carta?")) {
                database.splice(index, 1);
                renderContent();
            }
        }

        function closeAllModals() {
			document.body.style.overflow = "";
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('form-modal').classList.add('hidden');
			unlockScroll();
        }

        function initialize() {
            loadDatabase();
        }
		
		function exportData(type) {

			let filtered;

			if (type === "Coleccion") {
				filtered = database.filter(item => item.collection === "Coleccion");
			}

			else if (type === "Faltantes") {
				filtered = database.filter(item => item.collection === "Faltantes");
			}

			else if (type === "All") {
				filtered = database;
			}

			const sorted = sortDatabase(filtered);

			downloadJSON(sorted, `${type.toLowerCase()}.json`);
		}

		function downloadJSON(data, filename) {

			const blob = new Blob(
				[JSON.stringify(data, null, 2)],
				{ type: "application/json" }
			);

			const url = URL.createObjectURL(blob);

			const a = document.createElement("a");
			a.href = url;
			a.download = filename;
			a.click();

			URL.revokeObjectURL(url);
		}

        window.onload = initialize;
    </script>
</body>
</html>
